<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encurtador de Links</title>
    <link rel="stylesheet" href="./assets/style.css">
</head>

<body>
    <main class="shell">
        <section class="hero">
            <span class="eyebrow">Encurtador de links</span>
            <h1>Transforme URLs longas em links limpos e prontos para compartilhar.</h1>
            <!-- <p>Validação mais clara, resultado instantâneo e botão para copiar o link final em um clique.</p> -->
        </section>

        <section class="card">
            <form id="shortenForm" class="shorten-form" novalidate>
                <label for="fullUrl">Cole o link completo</label>
                <div class="url-field">
                    <span class="url-prefix">https://</span>
                    <input type="text" id="fullUrl" placeholder="exemplo.com/pagina" autocomplete="url" inputmode="url"
                        required>
                </div>
                <p class="help-text">O prefixo <strong>https://</strong> já vem fixo e qualquer repetição colada é
                    removida automaticamente.</p>
                <button id="shortenBtn" type="submit">Encurtar link</button>
            </form>

            <p id="formMessage" class="form-message" aria-live="polite"></p>

            <div id="result" class="result hidden" aria-live="polite">
                <div class="result-copy">
                    <div>
                        <span class="result-label">Seu link encurtado</span>
                        <a href="#" id="shortenedLink" target="_blank" rel="noreferrer noopener"></a>
                    </div>
                    <button id="copyBtn" type="button" class="secondary-btn">Copiar link</button>
                </div>
                <p id="copyStatus" class="copy-status"></p>
            </div>
        </section>
    </main>

    <script src="./assets/script.js"></script>
</body>

</html>
